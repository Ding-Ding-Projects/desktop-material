<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>$if(pagetitle)$$pagetitle$ · $endif$Desktop Material Docs</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #faf9fd;
        --surface: #ffffff;
        --text: #1c1b1f;
        --muted: #5f5c66;
        --accent: #6750a4;
        --border: #e3e0ea;
        --code-bg: #f2eff7;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #141218;
          --surface: #1d1a22;
          --text: #e6e1e9;
          --muted: #a9a3b2;
          --accent: #cfbcff;
          --border: #322f38;
          --code-bg: #24212b;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.65 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      header.site {
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        padding: 0.75rem 1.25rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1.25rem;
        align-items: baseline;
      }
      header.site strong {
        font-size: 1.05rem;
      }
      header.site a {
        color: var(--accent);
        text-decoration: none;
      }
      header.site a:hover {
        text-decoration: underline;
      }
      main {
        max-width: 52rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 4rem;
      }
      h1,
      h2,
      h3,
      h4 {
        line-height: 1.3;
        scroll-margin-top: 1rem;
      }
      h1 {
        font-size: 1.9rem;
      }
      a {
        color: var(--accent);
      }
      code {
        background: var(--code-bg);
        border-radius: 4px;
        padding: 0.1em 0.35em;
        font-size: 0.92em;
      }
      pre {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.9rem 1rem;
        overflow-x: auto;
      }
      pre code {
        background: none;
        padding: 0;
      }
      img {
        max-width: 100%;
        height: auto;
        border-radius: 8px;
        border: 1px solid var(--border);
      }
      table {
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
        max-width: 100%;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 0.45rem 0.7rem;
        text-align: left;
      }
      blockquote {
        border-left: 4px solid var(--accent);
        margin-left: 0;
        padding-left: 1rem;
        color: var(--muted);
      }
      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }
    </style>
  </head>
  <body>
    <header class="site">
      <strong><a href="$docsroot$../index.html">Desktop Material</a></strong>
      <a href="$docsroot$index.html">Documentation home</a>
      <a href="https://github.com/codingmachineedge/desktop-material"
        >Source on GitHub</a
      >
    </header>
    <main>$body$</main>
  </body>
</html>
